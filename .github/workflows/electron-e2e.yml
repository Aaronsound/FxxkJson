name: Electron E2E

on:
  pull_request:
    branches:
      - main
      - dev-codex
    paths:
      - '.github/workflows/electron-e2e.yml'
      - 'electron/**'
      - 'scripts/e2e-*.mjs'
      - 'src/types/electron.d.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.mts'
  workflow_dispatch:
    inputs:
      size_mb:
        description: 'Generated JSON sample size in MB'
        required: false
        default: '2'
        type: string
  schedule:
    - cron: '0 21 * * 0'

permissions:
  contents: read

concurrency:
  group: electron-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  electron-e2e:
    name: Desktop JSON Flow
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HANJSON_E2E_SIZE_MB: ${{ github.event_name == 'workflow_dispatch' && inputs.size_mb || '2' }}
      HANJSON_E2E_ARTIFACT_DIR: electron-e2e-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Install virtual display
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Electron E2E
        run: xvfb-run --auto-servernum npm run e2e:electron -- --size-mb "$HANJSON_E2E_SIZE_MB"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-e2e-diagnostics
          path: electron-e2e-artifacts
          if-no-files-found: ignore
