name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to package and release, for example v1.0.6'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout refs
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          git fetch --force origin main "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"

          tag_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
          main_sha="$(git rev-parse origin/main)"

          echo "Release tag ${RELEASE_TAG}: ${tag_sha}"
          echo "origin/main: ${main_sha}"

          if ! git merge-base --is-ancestor "${tag_sha}" "${main_sha}"; then
            echo "::error::Release tag ${RELEASE_TAG} must point to a commit contained in origin/main."
            exit 1
          fi

      - name: Create release entry
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: |
            ## 本次更新

            - 优化 5MB+ 大 JSON 的导入、格式化、搜索、替换、定位和查看流程。
            - 增强右侧格式化视图的节点操作，包括复制值、编辑、重命名、删除、当前节点折叠和所属对象折叠。
            - 改进右侧选中文本复制、左侧右键粘贴、性能面板定位和诊断日志体验。
            - 拆分大文件和复杂逻辑，补充单元测试、Electron E2E、性能回归和 CI 检查。
            - 完善 README、贡献指南、安全说明、PR 模板和发布流程。

            ## What's New

            - Improved import, formatting, search, replace, locate, and viewing flows for 5MB+ JSON files.
            - Enhanced right-pane node actions, including copy value, edit, rename, delete, current-node folding, and parent-object folding.
            - Improved right-pane selection copy, left-pane context-menu paste, performance panel placement, and diagnostics logging.
            - Split large files and complex logic while expanding unit tests, Electron E2E, performance checks, and CI coverage.
            - Updated README, contributing docs, security policy, pull request template, and release workflow.

            ## macOS 下载说明

            - Apple M 系列芯片（M1 / M2 / M3 / M4）：下载 `macos-arm64-*.dmg`
            - Intel 芯片 Mac：下载 `macos-x64-*.dmg`
            - Windows：下载 `windows-x64-*.exe`

            如果 M 系列 Mac 误装 x64 包，应用会通过 Rosetta 转译运行，导入和格式化大 JSON 可能明显变慢。

            ## Download Notes

            - Apple Silicon Macs (M1 / M2 / M3 / M4): download `macos-arm64-*.dmg`.
            - Intel Macs: download `macos-x64-*.dmg`.
            - Windows: download `windows-x64-*.exe`.

            If an Apple Silicon Mac installs the x64 package, the app will run through Rosetta and large JSON import or formatting may be noticeably slower.
          draft: true
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'alpha') || contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'beta') || contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'dev') }}

  build:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            artifact_name: macos-arm64
            builder_args: --mac --arm64
          - name: macOS x64
            os: macos-15-intel
            artifact_name: macos-x64
            builder_args: --mac --x64
          - name: Windows x64
            os: windows-latest
            artifact_name: windows-x64
            builder_args: --win --x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Sync package version from tag
        shell: pwsh
        run: |
          $appVersion = $env:RELEASE_TAG -replace '^v', ''
          if ($appVersion -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid SemVer version"
          }

          $env:APP_VERSION = $appVersion
          @'
          const fs = require("node:fs");

          const version = process.env.APP_VERSION;
          const packagePath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          packageJson.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          console.log(`Package version set to ${version}`);
          '@ | node

      - name: Run tests
        run: npm test

      - name: Run smoke flow
        run: npm run smoke

      - name: Build renderer and electron bundles
        run: npm run build

      - name: Build desktop package
        # Avoid inherited Electron mirror config rewriting electron-builder helper downloads.
        run: node node_modules/electron-builder/cli.js ${{ matrix.builder_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List packaged output
        if: always()
        shell: pwsh
        run: |
          if (Test-Path release) {
            Get-ChildItem -Recurse release | ForEach-Object { $_.FullName }
          } else {
            Write-Host "release directory does not exist"
          }

      - name: Collect release assets
        shell: pwsh
        run: |
          $artifactName = "${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force release-upload | Out-Null
          $patterns = @("*.dmg", "*.exe", "*.zip")
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path release -Filter $pattern -File -ErrorAction SilentlyContinue | ForEach-Object {
              $target = Join-Path "release-upload" "$artifactName-$($_.Name)"
              Copy-Item $_.FullName -Destination $target
            }
          }
          $files = Get-ChildItem -Path release-upload -File -ErrorAction SilentlyContinue
          if (-not $files) {
            throw "No packaged files were collected"
          }
          $files | ForEach-Object { $_.FullName }

      - name: Verify collected release asset version
        shell: pwsh
        run: |
          $appVersion = $env:RELEASE_TAG -replace '^v', ''
          $files = Get-ChildItem -Path release-upload -File -ErrorAction Stop
          $badFiles = $files | Where-Object { $_.Name -notlike "*$appVersion*" }
          if ($badFiles) {
            $names = ($badFiles | ForEach-Object { $_.Name }) -join ", "
            throw "Release asset names must include version $appVersion. Invalid files: $names"
          }

      - name: Verify collected release assets
        run: npm run release:assets:check -- local ${{ matrix.artifact_name }} release-upload

      - name: Remove previous target release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_PREFIX: ${{ matrix.artifact_name }}-
        run: |
          $release = gh release view $env:RELEASE_TAG --json assets | ConvertFrom-Json
          foreach ($asset in $release.assets) {
            if ($asset.name.StartsWith($env:ARTIFACT_PREFIX)) {
              gh release delete-asset $env:RELEASE_TAG $asset.name --yes
            }
          }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: |
            ## 本次更新

            - 优化 5MB+ 大 JSON 的导入、格式化、搜索、替换、定位和查看流程。
            - 增强右侧格式化视图的节点操作，包括复制值、编辑、重命名、删除、当前节点折叠和所属对象折叠。
            - 改进右侧选中文本复制、左侧右键粘贴、性能面板定位和诊断日志体验。
            - 拆分大文件和复杂逻辑，补充单元测试、Electron E2E、性能回归和 CI 检查。
            - 完善 README、贡献指南、安全说明、PR 模板和发布流程。

            ## What's New

            - Improved import, formatting, search, replace, locate, and viewing flows for 5MB+ JSON files.
            - Enhanced right-pane node actions, including copy value, edit, rename, delete, current-node folding, and parent-object folding.
            - Improved right-pane selection copy, left-pane context-menu paste, performance panel placement, and diagnostics logging.
            - Split large files and complex logic while expanding unit tests, Electron E2E, performance checks, and CI coverage.
            - Updated README, contributing docs, security policy, pull request template, and release workflow.

            ## macOS 下载说明

            - Apple M 系列芯片（M1 / M2 / M3 / M4）：下载 `macos-arm64-*.dmg`
            - Intel 芯片 Mac：下载 `macos-x64-*.dmg`
            - Windows：下载 `windows-x64-*.exe`

            如果 M 系列 Mac 误装 x64 包，应用会通过 Rosetta 转译运行，导入和格式化大 JSON 可能明显变慢。

            ## Download Notes

            - Apple Silicon Macs (M1 / M2 / M3 / M4): download `macos-arm64-*.dmg`.
            - Intel Macs: download `macos-x64-*.dmg`.
            - Windows: download `windows-x64-*.exe`.

            If an Apple Silicon Mac installs the x64 package, the app will run through Rosetta and large JSON import or formatting may be noticeably slower.
          draft: true
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'alpha') || contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'beta') || contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'dev') }}
          files: |
            release-upload/*

  publish-release:
    name: Verify Release Assets and Publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Read release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release view "$RELEASE_TAG" --json assets --jq '.assets' > release-assets.json

      - name: Verify published release assets
        run: npm run release:assets:check -- release release-assets.json

      - name: Verify published release asset versions
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');

          const expectedVersion = process.env.RELEASE_TAG.replace(/^v/, '');
          const assets = JSON.parse(fs.readFileSync('release-assets.json', 'utf8'));
          const releaseAssetPattern = /^(macos-arm64|macos-x64|windows-x64)-/;
          const badAssets = assets
            .map((asset) => String(asset.name ?? ''))
            .filter((name) => releaseAssetPattern.test(name) && !name.includes(expectedVersion));

          if (badAssets.length > 0) {
            throw new Error(`Release asset names must include version ${expectedVersion}: ${badAssets.join(', ')}`);
          }

          console.log(`Release asset versions passed for ${expectedVersion}`);
          NODE

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false
