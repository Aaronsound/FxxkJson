name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to package and release, for example v1.0.6'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            artifact_name: macos-arm64
            builder_args: --mac --arm64
          - name: macOS x64
            os: macos-15-intel
            artifact_name: macos-x64
            builder_args: --mac --x64
          - name: Windows x64
            os: windows-latest
            artifact_name: windows-x64
            builder_args: --win --x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Run tests
        run: npm test

      - name: Build renderer and electron bundles
        run: npm run build

      - name: Build desktop package
        run: npx electron-builder ${{ matrix.builder_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List packaged output
        if: always()
        shell: pwsh
        run: |
          if (Test-Path release) {
            Get-ChildItem -Recurse release | ForEach-Object { $_.FullName }
          } else {
            Write-Host "release directory does not exist"
          }

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact_name }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: desktop-release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'alpha') || contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'beta') || contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'dev') }}
          files: |
            desktop-release/**/*.dmg
            desktop-release/**/*.exe
            desktop-release/**/*.zip
            desktop-release/**/*.blockmap
            desktop-release/**/*.yml
