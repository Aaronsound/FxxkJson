name: CI

on:
  push:
    branches:
      - main
      - dev-codex
      - 'codex/**'
  pull_request:
    branches:
      - main
      - dev-codex

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Run project checks
        run: npm run check
